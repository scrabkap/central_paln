name: Deploy Central Planning POC

# One-shot deploy: CloudFormation (DynamoDB + Lambda + CloudFront) -> package
# Lambda -> upload SPA -> seed mock data -> invalidate CloudFront.
on:
  push:
    branches: [main]
    paths:
      - infra/**
      - lambda/**
      - web/**
      - seed/**
      - tools/**
      - dynamodb_tables.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

concurrency:
  group: cp-poc-deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STACK_NAME: central-planning-poc
  ADMIN_USERNAME: admin
  ADMIN_PASSWORD: Prodbug76
  AUTH_SECRET: cp-poc-hmac-2026-9f3a2b71c4

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        run: |
          AKID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          SKEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          # tolerate the common alternative secret names
          [ -z "$AKID" ] && AKID="${{ secrets.AWS_ACCESS_KEY }}"
          [ -z "$SKEY" ] && SKEY="${{ secrets.AWS_SECRET_KEY }}"
          if [ -z "$AKID" ] || [ -z "$SKEY" ]; then
            echo "::error::Missing AWS credentials. Add repo secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi
          aws configure set aws_access_key_id "$AKID"
          aws configure set aws_secret_access_key "$SKEY"
          aws configure set region "$AWS_REGION"
          echo "AWS_DEFAULT_REGION=$AWS_REGION" >> "$GITHUB_ENV"
          echo "Authenticated as:"
          aws sts get-caller-identity

      - name: Regenerate CloudFormation template
        run: |
          python -m pip install --quiet pyyaml
          python tools/build_template.py

      - name: Validate template
        run: aws cloudformation validate-template --template-body file://infra/template.yaml >/dev/null

      - name: Ensure artifact bucket
        id: artifact
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="cp-poc-artifacts-${ACCOUNT_ID}-${AWS_REGION}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET"
            else
              aws s3api create-bucket --bucket "$BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi
          echo "bucket=$BUCKET" >> "$GITHUB_OUTPUT"

      - name: Package Lambda
        id: pkg
        run: |
          cd lambda
          zip -q -r ../lambda.zip handler.py
          cd ..
          KEY="lambda/${GITHUB_SHA}.zip"
          aws s3 cp lambda.zip "s3://${{ steps.artifact.outputs.bucket }}/${KEY}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file infra/template.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              LambdaS3Bucket="${{ steps.artifact.outputs.bucket }}" \
              LambdaS3Key="${{ steps.pkg.outputs.key }}" \
              AdminUsername="$ADMIN_USERNAME" \
              AdminPassword="$ADMIN_PASSWORD" \
              AuthSecret="$AUTH_SECRET"

      - name: Read stack outputs
        id: out
        run: |
          get() { aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='$1'].OutputValue" --output text; }
          echo "web_bucket=$(get WebBucketName)" >> "$GITHUB_OUTPUT"
          echo "dist_id=$(get DistributionId)" >> "$GITHUB_OUTPUT"
          echo "url=$(get CloudFrontURL)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(get ApiEndpoint)" >> "$GITHUB_OUTPUT"

      - name: Inject API URL into the SPA
        run: |
          API="${{ steps.out.outputs.api_url }}"
          API="${API%/}"   # strip trailing slash
          printf 'window.CP_API=%s;\n' "\"$API\"" > web/config.js
          echo "config.js -> $(cat web/config.js)"

      - name: Upload SPA to S3
        run: |
          # no-cache on every asset so future deploys propagate without stale edge copies
          aws s3 sync web/ "s3://${{ steps.out.outputs.web_bucket }}/" --delete \
            --cache-control "no-cache, must-revalidate"

      - name: Seed mock data into DynamoDB
        run: |
          python -m pip install --quiet boto3
          python seed/seed.py

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.out.outputs.dist_id }}" \
            --paths "/*" >/dev/null

      - name: Smoke test the API (Function URL) and the SPA (CloudFront)
        run: |
          API="${{ steps.out.outputs.api_url }}"; API="${API%/}"
          CF="${{ steps.out.outputs.url }}"
          echo "API=$API"; echo "CF=$CF"
          # 1) login directly against the Function URL (this is what the SPA calls)
          echo "== POST $API/api/login =="
          CODE=$(curl -s -o /tmp/login.json -w '%{http_code}' -m 30 -X POST "$API/api/login" \
            -H 'content-type: application/json' \
            -d '{"username":"admin","password":"Prodbug76"}')
          echo "http=$CODE body=$(cat /tmp/login.json)"
          [ "$CODE" = "200" ] || { echo "::error::Function URL login HTTP $CODE"; exit 1; }
          grep -q '"ok": *true' /tmp/login.json || { echo "::error::login ok!=true"; exit 1; }
          grep -q '"token"'      /tmp/login.json || { echo "::error::no token"; exit 1; }
          # 2) CORS preflight must succeed (browser sends this cross-origin)
          echo "== OPTIONS preflight =="
          curl -s -i -m 30 -X OPTIONS "$API/api/login" \
            -H "Origin: $CF" -H 'Access-Control-Request-Method: POST' \
            -H 'Access-Control-Request-Headers: content-type' | grep -i 'access-control-allow-origin' \
            || echo "::warning::no CORS header on preflight"
          # 3) data routes with the issued token
          TOKEN=$(sed -n 's/.*"token": *"\([^"]*\)".*/\1/p' /tmp/login.json)
          OVCODE=$(curl -s -o /tmp/ov.json -w '%{http_code}' -m 30 "$API/api/overview" -H "authorization: Bearer $TOKEN")
          echo "overview http=$OVCODE ok=$(grep -o '"ok": *[a-z]*' /tmp/ov.json | head -1)"
          curl -s -o /tmp/promos.json -m 30 "$API/api/promotions" -H "authorization: Bearer $TOKEN"
          grep -q '"promo_items"' /tmp/promos.json || { echo "::error::/api/promotions missing promo_items"; exit 1; }
          echo "promotions bytes=$(wc -c < /tmp/promos.json)"
          curl -s -o /tmp/pd.json -m 30 "$API/api/promo?promo_id=PROMO-2001" -H "authorization: Bearer $TOKEN"
          grep -q '"allocations"' /tmp/pd.json || { echo "::error::/api/promo detail missing allocations"; exit 1; }
          echo "promo-detail ok"
          # 4) the SPA loads with the API URL injected
          echo "== GET $CF (SPA) =="
          curl -s -m 30 "$CF/config.js"; echo
          curl -s -m 30 "$CF/" | grep -q 'id="app"' && echo "SPA index served OK"
          echo "Smoke test passed."

      - name: Summary
        run: |
          {
            echo "## Central Planning POC deployed"
            echo ""
            echo "**Dashboard:** ${{ steps.out.outputs.url }}"
            echo ""
            echo "- Login: \`admin\` / \`Prodbug76\`"
            echo "- Stack: \`$STACK_NAME\` (region \`$AWS_REGION\`)"
            echo "- CloudFront may take a few minutes to finish propagating on first deploy."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Dashboard URL: ${{ steps.out.outputs.url }}"
