AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Central Planning POC - operational dashboard for retail central planning.
  CloudFront (login-gated SPA) + Lambda (Function URL API) + DynamoDB.

Parameters:
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket holding the packaged API Lambda zip.
  LambdaS3Key:
    Type: String
    Description: S3 key of the packaged API Lambda zip.
  AdminUsername:
    Type: String
    Default: admin
  AdminPassword:
    Type: String
    Default: Prodbug76
    NoEcho: true
  AuthSecret:
    Type: String
    Default: cp-poc-hmac-secret-2026-change-me
    NoEcho: true

Resources:
  # ============================================================
  # DynamoDB tables (generated from dynamodb_tables.json)
  # ============================================================
  CpItemsTbl:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cp_items
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: GSI1PK
        AttributeType: S
      - AttributeName: GSI1SK
        AttributeType: S
      - AttributeName: GSI2PK
        AttributeType: S
      - AttributeName: GSI2SK
        AttributeType: S
      - AttributeName: GSI3PK
        AttributeType: S
      - AttributeName: GSI3SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: gsi1_by_leader
        KeySchema:
        - AttributeName: GSI1PK
          KeyType: HASH
        - AttributeName: GSI1SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: gsi2_by_group
        KeySchema:
        - AttributeName: GSI2PK
          KeyType: HASH
        - AttributeName: GSI2SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: gsi3_by_vendor
        KeySchema:
        - AttributeName: GSI3PK
          KeyType: HASH
        - AttributeName: GSI3SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
