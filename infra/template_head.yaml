AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Central Planning POC - operational dashboard for retail central planning.
  CloudFront (login-gated SPA) + Lambda (Function URL API) + DynamoDB.

Parameters:
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket holding the packaged API Lambda zip.
  LambdaS3Key:
    Type: String
    Description: S3 key of the packaged API Lambda zip.
  AdminUsername:
    Type: String
    Default: admin
  AdminPassword:
    Type: String
    Default: Prodbug76
    NoEcho: true
  AuthSecret:
    Type: String
    Default: cp-poc-hmac-secret-2026-change-me
    NoEcho: true

Resources:
  # ============================================================
  # DynamoDB tables (generated from dynamodb_tables.json)
  # ============================================================
  # __DYNAMO_TABLES__

  # ============================================================
  # Static web hosting (private S3 + CloudFront OAC)
  # ============================================================
  WebBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'cp-poc-web-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'cp-poc-oac-${AWS::StackName}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ============================================================
  # API Lambda + Function URL
  # ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: cp-dynamo-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:BatchGetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cp_*'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/cp_*/index/*'

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'cp-poc-api-${AWS::StackName}'
      Runtime: python3.12
      Handler: handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt LambdaRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          ADMIN_USERNAME: !Ref AdminUsername
          ADMIN_PASSWORD: !Ref AdminPassword
          AUTH_SECRET: !Ref AuthSecret
          TABLE_PREFIX: cp_

  # ============================================================
  # API Gateway HTTP API in front of the Lambda (payload format 2.0).
  # Used instead of a public Lambda Function URL, which can be blocked by
  # org guardrails. The SPA calls this endpoint directly (Lambda handles CORS).
  # ============================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'cp-poc-http-${AWS::StackName}'
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiFunction.Arn
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  ApiGwInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

  # ============================================================
  # CloudFront distribution (serves the SPA; API is the Lambda Function URL)
  # ============================================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Central Planning POC
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        Origins:
          - Id: s3-web
            DomainName: !GetAtt WebBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: s3-web
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontURL:
    Description: Dashboard URL (login admin / Prodbug76)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  WebBucketName:
    Description: S3 bucket for the SPA assets
    Value: !Ref WebBucket
  DistributionId:
    Description: CloudFront distribution id (for cache invalidation)
    Value: !Ref CloudFrontDistribution
  ApiEndpoint:
    Description: HTTP API base URL (the API; the SPA calls this directly via CORS)
    Value: !GetAtt HttpApi.ApiEndpoint
